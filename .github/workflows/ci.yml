name: CI

on:
  push:
    branches: [experiment/ts-rewrite]
  pull_request:
    branches: [experiment/ts-rewrite]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]  # 你用的是 24 LTS，20 太老了

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4  # 官方 action，更稳
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck  # 在 package.json 里定义脚本，比裸写 npx tsc 好

      - name: Lint
        run: pnpm lint  # 如果有 ESLint

      - name: Run tests
        run: pnpm test